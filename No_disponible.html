<body>

    <style>
        /* Variables de Estilo Premium */
        :root {
            --bg-main: #050505;
            --accent-gold: #c5a880;
            --accent-gold-hover: #e5c9a2;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border-color: rgba(197, 168, 128, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }

        /* Configuración Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Cinzel', 'Didot', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
          zoom:75%;
        }

        /* Fondo Decorativo de Lujo (Efecto de Luz de Estudio) */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(197, 168, 128, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* Contenedor Principal (Efecto de Cristal Esmerilado) */
        .premium-container {
            position: relative;
            z-index: 2;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 3.5rem 2.5rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        /* Icono Minimalista Elegante */
        .icon-wrapper {
            margin-bottom: 2rem;
        }
        .icon-wrapper svg {
            width: 48px;
            height: 48px;
            stroke: var(--accent-gold);
            stroke-width: 1;
            fill: none;
        }

        /* Tipografía Exclusiva */
        h1 {
            font-size: 1.75rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-bottom: 1.2rem;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
        }

        /* Botón de Acción Estilo Alta Costura */
        .btn-luxury {
            display: inline-block;
            text-decoration: none;
            color: var(--bg-main);
            background-color: var(--accent-gold);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 1rem 2.5rem;
            border: 1px solid var(--accent-gold);
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-luxury:hover {
            background-color: transparent;
            color: var(--accent-gold-hover);
            border-color: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(197, 168, 128, 0.15);
        }

        /* Animación de Entrada */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>
