<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=3.0, minimum-scale=1.0">
   <link rel="icon" href="https://zeroinfierso.gieovannyfrias.com/Imagenes/Logo.webp" type="image/x-icon">
  <title>Sin conexión</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #050605;
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      zoom:75%;
    }
    .card {
      max-width: 600px;
      padding: 2rem;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 1rem;
  
   color: #fff;
  text-transform: uppercase;
  text-shadow:
    0 0 5px #0ff,
    0 0 10px #0ff,
    0 0 20px #0ff,
    0 0 40px #0ff,
    0 0 80px #0ff;
  animation: flicker 2s infinite alternate;
}

@keyframes flicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
    opacity: 1;
  }
  20%, 24%, 55% {
    opacity: 0.3;
  }
}
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #cbd5e1;
    }
    button {
      background: #38bdf8;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      color: #0f172a;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sin conexión a internet</h1>
    <p>No pudimos cargar la página Zeroinfierso porque no tienes acceso a la red.<br>
       Por favor revisa tu conexión y vuelve a intentarlo.</p>
    <button onclick="location.reload()">🔄 Reintentar</button>
  </div>
</body>
</html>
