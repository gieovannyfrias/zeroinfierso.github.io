<style>
   :root {
  --bg-deep: #050605;
  --glass: rgba(15, 18, 15, 0.85);
  --glass-border: rgba(255, 255, 255, 0.1);

.ventas-temporada {

}

@keyframes flicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
    opacity: 1;
  }
  20%, 24%, 55% {
    opacity: 0.3;
  }
}
}

.ventas-temporada .descuento {
  font-size: 20px;
  font-weight: bold;
  color: #d6336c;
  margin-bottom: 25px;
}

/* Cuenta regresiva */
#countdown {
  font-size: 18px;
  font-weight: bold;
  color: #333;
  margin-bottom: 20px;
}

/* Botón */
.btn-comprar {
  display: inline-block;
  background:#ffffff;
  color:black;
  padding: 10px 24px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  font-size: 15px;

      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 800;
    letter-spacing: -0.03em;
    text-transform: uppercase;
}
.btn-comprar:hover {
  background: grey;
  transform: scale(1.05);
}

/* Catálogo */
.grid-verano {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 25px;
}

.grid-verano .producto {
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  position: relative;
  transition: transform 0.2s ease;
  animation: slideUp 0.8s ease;
  
      background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-base);
  color: white;
 }
.grid-verano .producto:hover {
  transform: translateY(-6px);
}

.grid-verano .producto img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* Etiquetas de descuento */
.badge {
  position: absolute;
  top: 15px;
  left: 15px;
  background: #d6336c;
  color: #fff;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

/* Animaciones */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* 📱 Adaptación móvil */
@media (max-width: 768px) {
  .ventas-temporada {
    padding: 40px 15px;
  }
  .ventas-temporada h2 {
    font-size: 24px;
  }

    font-size: 16px;
  }
  .grid-verano {
    grid-template-columns: 1fr;
  }
  .btn-comprar {
    width: 100%;
    padding: 12px;
    font-size: 16px;
  }
}


</style>
<script>
// Cuenta regresiva hasta una fecha (ejemplo: fin de junio)
const countdown = document.getElementById("countdown");
const endDate = new Date("June 30, 2026 23:59:59").getTime();

function actualizarCountdown() {
  const now = new Date().getTime();
  const distance = endDate - now;

  if (distance < 0) {
    countdown.innerHTML = "¡Promoción terminada!";
    return;
  }

  const dias = Math.floor(distance / (1000 * 60 * 60 * 24));
  const horas = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutos = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const segundos = Math.floor((distance % (1000 * 60)) / 1000);

  countdown.innerHTML = `Termina en: ${dias}d ${horas}h ${minutos}m ${segundos}s`;
}

setInterval(actualizarCountdown, 1000);

</script>
